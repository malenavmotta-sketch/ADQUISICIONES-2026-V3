<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adquisiciones 2026 - Bioingeniería</title>
<style>
/* ... Mantener estilos anteriores ... */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
:root{--bg1:#ffffff;--bg2:#f1efe8;--t1:#1a1a1a;--t2:#5f5e5a;--t3:#888780;--b1:rgba(0,0,0,0.12);--b2:rgba(0,0,0,0.25);--r1:8px;--r2:12px;--accent:#27500A}

/* Estilos nuevos para Distribución */
.dist-card { background: var(--bg1); border: 0.5px solid var(--b1); border-radius: var(--r2); margin-bottom: 12px; padding: 1rem; }
.dist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--b2); padding-bottom: 5px; }
.dist-title { font-weight: 600; font-size: 15px; color: var(--accent); }
.dist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.dist-item { background: var(--bg2); padding: 6px 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 12px; }
.dist-qty { font-weight: 700; color: var(--t1); }

/* Estilos para Multiselect simplificado */
.filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
.filter-group label { font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; }

header{background:var(--bg1);border-bottom:0.5px solid var(--b1);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:baseline;gap:12px}
header h1{font-size:17px;font-weight:500}
.sync-btn{padding:5px 12px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r1);background:var(--bg1);color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px}
.container{max-width:1300px;margin:0 auto;padding:1.5rem}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--b1)}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--t1);border-bottom:2px solid var(--t1);font-weight:500}
.card-full{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);padding:1rem 1.25rem;margin-bottom:1.5rem}
.card-title{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:12px}
.table-wrap{overflow-x:auto}
table.main{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
table.main th{text-align:left;padding:8px 10px;color:var(--t2);font-weight:500;border-bottom:0.5px solid var(--b1);white-space:nowrap;background:var(--bg1)}
table.main td{padding:7px 10px;border-bottom:0.5px solid var(--b1)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.bs3{background:#EAF3DE;color:#27500A}
.filters{display:flex;gap:12px;margin-bottom:15px;flex-wrap:wrap;background:var(--bg1);padding:15px;border-radius:var(--r2);border:0.5px solid var(--b1)}
select, input { padding: 8px; border-radius: 6px; border: 1px solid var(--b2); background: var(--bg1); color: var(--t1); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Adquisiciones 2026 | Ministerio de Salud</h1>
    <span id="header-count" style="font-size:13px;color:var(--t3)"></span>
  </div>
  <button class="sync-btn" onclick="cargarDatos(true)">
    <span id="sync-label">Actualizar</span>
  </button>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('equipos')">Lista de Equipos</button>
    <button class="tab" onclick="showTab('distribucion')">Distribución por Hospital</button>
  </div>

  <div id="filtros-container" class="filters" style="display:none">
    <div class="filter-group">
      <label>Buscar</label>
      <input type="text" id="search" placeholder="Equipo o Hospital..." oninput="ejecutarFiltros()">
    </div>
    <div class="filter-group">
      <label>Proyecto</label>
      <select id="f-proy" onchange="ejecutarFiltros()"><option value="">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Licitación</label>
      <select id="f-licit" onchange="ejecutarFiltros()"><option value="">Todas</option></select>
    </div>
    <div class="filter-group">
      <label>Estado</label>
      <select id="f-estado" onchange="ejecutarFiltros()">
        <option value="">Todos</option>
        <option>ARMADO DE PLIEGO</option>
        <option>PUBLICACION</option>
        <option>ADJUDICADO</option>
      </select>
    </div>
  </div>

  <div id="tab-dashboard">
    <div class="card-full">
      <div class="card-title">Resumen de Inversión</div>
      <div id="metrics-summary">Cargando...</div>
    </div>
  </div>

  <div id="tab-equipos" style="display:none">
    <div class="table-wrap">
      <table class="main">
        <thead>
          <tr>
            <th>Hospital</th><th>Equipo</th><th>Cant.</th><th>Monto Total</th><th>Proyecto</th><th>Licitación</th><th>Estado</th>
          </tr>
        </thead>
        <tbody id="tbody-equipos"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-distribucion" style="display:none">
    <div id="distribucion-container"></div>
  </div>
</div>

<script>
// Malena, recordá que esta URL es la que ya tenés funcionando de tu Apps Script
var API_URL = 'https://script.google.com/macros/s/AKfycbzD-hJkihX-7wLb4DqUfGCYtIYRWEc2VdziaJ5h0EbMnZhCZAaKx67aoCCLY-Os7jD3/exec';
var datosOriginales = [];
var datosFiltrados = [];

function cargarDatos(manual) {
  fetch(API_URL).then(res => res.json()).then(rows => {
    datosOriginales = rows.filter(r => r.HOSPITAL && r.HOSPITAL !== 'CANTIDAD');
    llenarSelects();
    ejecutarFiltros();
  });
}

function llenarSelects() {
  const proy = [...new Set(datosOriginales.map(d => d['NOMBRE PROYECTO']))].sort();
  const licit = [...new Set(datosOriginales.map(d => d['LICITACION']))].sort();
  
  document.getElementById('f-proy').innerHTML = '<option value="">Todos</option>' + proy.map(p => `<option value="${p}">${p}</option>`).join('');
  document.getElementById('f-licit').innerHTML = '<option value="">Todas</option>' + licit.map(l => `<option value="${l}">${l}</option>`).join('');
}

function ejecutarFiltros() {
  const s = document.getElementById('search').value.toLowerCase();
  const p = document.getElementById('f-proy').value;
  const l = document.getElementById('f-licit').value;
  const e = document.getElementById('f-estado').value;

  datosFiltrados = datosOriginales.filter(d => {
    const matchSearch = (d.EQUIPO + d.HOSPITAL).toLowerCase().includes(s);
    const matchProy = !p || d['NOMBRE PROYECTO'] === p;
    const matchLicit = !l || d['LICITACION'] === l;
    const matchEst = !e || d['ESTADO'] === e;
    return matchSearch && matchProy && matchLicit && matchEst;
  });

  renderTabla();
  renderDistribucion();
}

function renderTabla() {
  const tbody = document.getElementById('tbody-equipos');
  tbody.innerHTML = datosFiltrados.map(d => `
    <tr>
      <td><b>${d.HOSPITAL}</b></td>
      <td>${d.EQUIPO}</td>
      <td>${d['Q SOLICIT.']}</td>
      <td>USD ${parseFloat(d['P. TOTAL'] || 0).toLocaleString()}</td>
      <td>${d['NOMBRE PROYECTO']}</td>
      <td style="color:var(--t3)">${d['LICITACION'] || '--'}</td>
      <td><span class="badge bs3">${d.ESTADO}</span></td>
    </tr>
  `).join('');
}

function renderDistribucion() {
  const container = document.getElementById('distribucion-container');
  // Agrupar por EQUIPO
  const agrupado = datosFiltrados.reduce((acc, curr) => {
    if (!acc[curr.EQUIPO]) acc[curr.EQUIPO] = { total: 0, hospitales: {} };
    acc[curr.EQUIPO].total += parseInt(curr['Q SOLICIT.'] || 0);
    const h = curr.HOSPITAL;
    acc[curr.EQUIPO].hospitales[h] = (acc[curr.EQUIPO].hospitales[h] || 0) + parseInt(curr['Q SOLICIT.'] || 0);
    return acc;
  }, {});

  let html = '';
  for (const equipo in agrupado) {
    html += `
      <div class="dist-card">
        <div class="dist-header">
          <div class="dist-title">${equipo}</div>
          <div class="badge bs3">Total: ${agrupado[equipo].total} unidades</div>
        </div>
        <div class="dist-grid">
          ${Object.entries(agrupado[equipo].hospitales).map(([h, q]) => `
            <div class="dist-item">
              <span>${h}</span>
              <span class="dist-qty">${q}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  container.innerHTML = html || '<p class="empty">No hay datos para mostrar con esos filtros.</p>';
}

function showTab(t) {
  ['dashboard', 'equipos', 'distribucion'].forEach(tab => {
    document.getElementById('tab-' + tab).style.display = (tab === t) ? 'block' : 'none';
  });
  document.getElementById('filtros-container').style.display = (t === 'dashboard') ? 'none' : 'flex';
  
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.innerText.toLowerCase().includes(t.substring(0,4)));
  });
}

cargarDatos();
</script>
</body>
</html>
