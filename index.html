<script>
// URL de tu API
var API_URL = 'https://script.google.com/macros/s/AKfycbzD-hJkihX-7wLb4DqUfGCYtIYRWEc2VdziaJ5h0EbMnZhCZAaKx67aoCCLY-Os7jD3/exec';

var agrupados = [];
var filtrosActivos = { estado: [], proy: [], hosp: [] };

// Formateo de moneda
function fmtUSD(n){ 
    return (n && !isNaN(n)) ? 'USD ' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'; 
}

function cargarDatos(manual){
    var dot = document.getElementById('sync-dot'), lbl = document.getElementById('sync-label');
    dot.className = 'sync-dot loading'; lbl.textContent = 'Cargando...';

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {
        // Mapeo directo según los campos de tu Sheet
        agrupados = data.filter(r => r['HOSPITAL'] && !r['HOSPITAL'].includes('CANTIDAD')).map(r => ({
            hospital: r['HOSPITAL'] || 'Sin Hospital',
            equipo: r['EQUIPO'] || 'Sin Equipo',
            tipo_equipo: r['TIPO'] || '—',
            cantidad: parseInt(r['Q SOLICIT.']) || 0,
            p_unit: parseFloat(r['P. UNIT']) || 0,
            p_total: parseFloat(r['P. TOTAL']) || 0,
            chequeado: r['CHEQUEADO CON SP'] || 'FALSE',
            tipo_proyecto: r['TIPO PROYECTO'] || '—',
            anio_entrega: r['AÑO ENTREGA'] || '—',
            proyecto: r['NOMBRE PROYECTO'] || 'SIN PROYECTO',
            estado: r['ESTADO'] || 'SIN AVANCE',
            expediente: r['EXPEDIENTE'] || '—',
            licitacion: r['LICITACION'] || 'PENDIENTE',
            renglon: parseInt(r['RENGLON']) || 0,
            fecha_apertura: r['FECHA DE APERTURA'] || '',
            observacion: r['OBSERVACION'] || ''
        }));

        dot.className = 'sync-dot';
        lbl.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
        
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        generarOpcionesFiltros();
        renderTabla();
    })
    .catch(err => {
        dot.className = 'sync-dot error';
        lbl.textContent = 'Error';
        console.error(err);
    });
}

// --- MULTIFILTRO: GENERACIÓN Y LÓGICA ---
function generarOpcionesFiltros(){
    // Obtener valores únicos de los datos reales
    let estados = [...new Set(agrupados.map(a => a.estado))].sort();
    let proys = [...new Set(agrupados.map(a => a.proyecto))].sort();
    let hosps = [...new Set(agrupados.map(a => a.hospital))].sort();
    
    llenarPanel('estado', estados);
    llenarPanel('proy', proys);
    llenarPanel('hosp', hosps);
}

function llenarPanel(tipo, opciones){
    let panel = document.getElementById('ms-panel-' + tipo);
    if(!panel) return;
    panel.innerHTML = opciones.map(opt => `
        <div class="ms-item" onclick="event.stopPropagation()">
            <input type="checkbox" value="${opt}" id="chk-${tipo}-${opt}" onchange="actualizarFiltro('${tipo}', this)">
            <label for="chk-${tipo}-${opt}">${opt}</label>
        </div>
    `).join('');
}

function actualizarFiltro(tipo, cb){
    if(cb.checked) filtrosActivos[tipo].push(cb.value);
    else filtrosActivos[tipo] = filtrosActivos[tipo].filter(v => v !== cb.value);
    
    // Actualizar contador visual
    let cnt = document.getElementById('ms-cnt-' + tipo);
    if(cnt) {
        cnt.textContent = filtrosActivos[tipo].length;
        cnt.style.display = filtrosActivos[tipo].length > 0 ? 'inline-block' : 'none';
    }
    renderTabla();
}

function limpiarFiltros(){
    filtrosActivos = { estado: [], proy: [], hosp: [] };
    document.querySelectorAll('.ms-panel input').forEach(i => i.checked = false);
    document.querySelectorAll('.ms-count').forEach(c => { c.textContent = '0'; c.style.display = 'none'; });
    document.getElementById('search').value = '';
    renderTabla();
}

// --- RENDERIZADO DE SECCIONES ---

function renderTabla(){
    let search = document.getElementById('search').value.toLowerCase();
    let filtrados = agrupados.filter(a => {
        let matchSearch = a.equipo.toLowerCase().includes(search) || a.hospital.toLowerCase().includes(search);
        let matchEstado = filtrosActivos.estado.length === 0 || filtrosActivos.estado.includes(a.estado);
        let matchProy = filtrosActivos.proy.length === 0 || filtrosActivos.proy.includes(a.proyecto);
        let matchHosp = filtrosActivos.hosp.length === 0 || filtrosActivos.hosp.includes(a.hospital);
        return matchSearch && matchEstado && matchProy && matchHosp;
    });

    document.getElementById('tbody').innerHTML = filtrados.map(a => `
        <tr>
            <td>${a.hospital}</td>
            <td>${a.equipo}</td>
            <td>${a.tipo_equipo}</td>
            <td style="text-align:center">${a.cantidad}</td>
            <td>${fmtUSD(a.p_unit)}</td>
            <td>${fmtUSD(a.p_total)}</td>
            <td>${a.proyecto}</td>
            <td>${a.tipo_proyecto}</td>
            <td>${a.anio_entrega}</td>
            <td>${a.expediente}</td>
            <td>${a.licitacion}</td>
            <td>${a.fecha_apertura}</td>
            <td><span class="badge bs0">${a.estado}</span></td>
            <td><span class="tag-cheq ${a.chequeado === 'TRUE' ? 'tag-si' : 'tag-no'}">${a.chequeado === 'TRUE' ? 'SI' : 'NO'}</span></td>
        </tr>
    `).join('');
}

function renderProyectos(){
    let searchInput = document.getElementById('proy-search-input');
    let query = searchInput ? searchInput.value.toLowerCase() : '';
    
    // Agrupar por nombre de proyecto
    let proyectosSet = [...new Set(agrupados.map(a => a.proyecto))];
    let proysFiltrados = proyectosSet.filter(p => p.toLowerCase().includes(query)).sort();
    
    document.getElementById('proy-container').innerHTML = proysFiltrados.map((p, idx) => {
        let items = agrupados.filter(a => a.proyecto === p);
        let totalUSD = items.reduce((sum, cur) => sum + cur.p_total, 0);
        
        return `
            <div class="proy-card">
                <div class="proy-header" onclick="toggleDiv('proy-body-${idx}', 'arrow-p-${idx}')">
                    <div style="flex:1">
                        <div class="proy-name">${p}</div>
                        <div style="font-size:11px; color:var(--t3)">${items.length} equipos registrados</div>
                    </div>
                    <div class="proy-meta">
                        <span class="proy-monto">${fmtUSD(totalUSD)}</span>
                        <span class="proy-arrow" id="arrow-p-${idx}">▶</span>
                    </div>
                </div>
                <div class="proy-body" id="proy-body-${idx}">
                    <table class="proy-table">
                        <thead><tr><th>Hospital</th><th>Equipo</th><th>Cantidad</th><th>Estado</th></tr></thead>
                        <tbody>
                            ${items.map(i => `<tr><td>${i.hospital}</td><td>${i.equipo}</td><td>${i.cantidad}</td><td>${i.estado}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }).join('');
}

function renderDistribucion(){
    // Agrupar por Licitación
    let licitaciones = [...new Set(agrupados.map(a => a.licitacion))].sort();
    
    document.getElementById('dist-container').innerHTML = licitaciones.map((lic, idx) => {
        let items = agrupados.filter(a => a.licitacion === lic);
        
        // ORDENAR: Renglón (Menor a Mayor), luego Equipo, Tipo y Cantidad
        items.sort((a, b) => a.renglon - b.renglon || a.equipo.localeCompare(b.equipo));
        
        let montoTotal = items.reduce((sum, cur) => sum + cur.p_total, 0);

        return `
            <div class="dist-card">
                <div class="dist-header" onclick="toggleDiv('dist-body-${idx}', 'arrow-d-${idx}')">
                    <div style="flex:1">
                        <div class="dist-name">Licitación: <b>${lic}</b></div>
                        <div style="font-size:12px; color:var(--t3)">Monto Total Licitado: ${fmtUSD(montoTotal)}</div>
                    </div>
                    <div class="dist-meta">
                        <span class="dist-hosps">${items.length} renglones</span>
                        <span class="dist-arrow" id="arrow-d-${idx}">▶</span>
                    </div>
                </div>
                <div class="dist-body" id="dist-body-${idx}">
                    <table class="dist-table">
                        <thead>
                            <tr>
                                <th>Renglón</th>
                                <th>Hospital</th>
                                <th>Equipo</th>
                                <th>Tipo Equipo</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map(i => `
                                <tr>
                                    <td style="font-weight:bold; color:var(--accent)">#${i.renglon}</td>
                                    <td>${i.hospital}</td>
                                    <td>${i.equipo}</td>
                                    <td>${i.tipo_equipo}</td>
                                    <td style="text-align:center"><b>${i.cantidad}</b></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }).join('');
}

// Auxiliares de UI
function toggleDiv(bodyId, arrowId){
    document.getElementById(bodyId).classList.toggle('open');
    document.getElementById(arrowId).classList.toggle('open');
}

function showTab(t){
    const tabs = ['dashboard', 'proyectos', 'equipos', 'distribucion'];
    tabs.forEach(tab => {
        document.getElementById('tab-' + tab).style.display = (tab === t) ? 'block' : 'none';
    });
    // Activar funciones de renderizado según la pestaña
    if(t === 'proyectos') renderProyectos();
    if(t === 'distribucion') renderDistribucion();
    if(t === 'equipos') renderTabla();
}

// Inicio automático
cargarDatos();
</script>
